services:
  # ─── Sensores ─────────────────────────────────────────────
  sensor:
    build: ./sensors
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: sensorData
      SENSOR_COUNT: ${SENSOR_COUNT:-10} # sensores simulados por grupo (container)
      FREQUENCY_HZ: 10
      EDGE_COMPUTING: "false" # muda para "true" na R5
      API_URL: http://web_app_api:4344
      API_USERNAME: ${API_USERNAME}
      API_EMAIL: ${API_EMAIL}
      API_PASSWORD: ${API_PASSWORD}
      AREA_LAT: ${AREA_LAT}
      AREA_LON: ${AREA_LON}
      AREA_NAME: ${AREA_NAME}
      AREA_URL: ${AREA_URL}
    deploy:
      replicas: ${SENSOR_NUMBER:-10} # um container gerencia N sensores
    depends_on:
      - web_app_api
      - kafka
      - init-kafka
    networks:
      - soundmap-net
  database:
    build: ./database
    container_name: soundmap_db
    environment:
      - POSTGRES_DB=soundmap
      - POSTGRES_USER=admin_g4
      - POSTGRES_PASSWORD=admin_g4
    volumes:
      - pg_volumn:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - soundmap-net

  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: soundmap_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - soundmap-net

  kafka:
    image: confluentinc/cp-kafka:8.1.3
    user: root
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_BROKER_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - CLUSTER_ID=EmptNWtoR4GGWx-BH6nGLQ
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - soundmap-net

  init-kafka:
    image: confluentinc/cp-kafka:8.1.3
    container_name: init-kafka
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Aguardando o broker do Kafka responder na porta 9092..."
        until kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do
          echo "Kafka ainda nao esta pronto. Aguardando 2 segundos..."
          sleep 2
        done

        echo "Kafka online! Criando topicos..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic sensorData --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic appData --replication-factor 1 --partitions 1

        echo "Topicos validados com sucesso no cluster:"
        kafka-topics --bootstrap-server kafka:9092 --list
    networks:
      - soundmap-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "5384:8080" # imagem escuta na porta 8080 por padrão
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_METRICS_PORT=9997
      - DYNAMIC_CONFIG_ENABLED=true
    networks:
      - soundmap-net

  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=sensorData
      - KAFKA_APP_TOPIC=appData
      - DB_HOST=soundmap_db
      - DB_PORT=5432
      - DB_NAME=soundmap
      - DB_USER=admin_g4
      - DB_PASSWORD=admin_g4
      - REDIS_HOST=soundmap_redis
      - REDIS_PORT=6379
      - TRIGGER_INTERVAL=${TRIGGER_INTERVAL:-5 seconds}
      - CHECKPOINT_INTERVAL=${CHECKPOINT_INTERVAL:-30 seconds}
      - CHECKPOINT_DIR=${CHECKPOINT_DIR:-/checkpoint}
      - SPARK_MASTER_CPUS=${SPARK_MASTER_CPUS:-2}
      - EDGE_COMPUTING=${EDGE_COMPUTING:-false}
      - LOAD_LEVEL=${LOAD_LEVEL:-medium}
      - ROUND_ID=${ROUND_ID:-R1}
      - FAULT_INJECTION=${FAULT_INJECTION:-false}
      - FREQUENCY_HZ=${FREQUENCY_HZ:-10}
      - WINDOW_DURATION=${WINDOW_DURATION:-30 seconds}
      - WATERMARK=${WATERMARK:-1 minute}
    ports:
      - "4040:4040" # Spark UI
      - "9091:9091" # Listener metrics
    tty: true
    stdin_open: true
    depends_on:
      - kafka
      - database
      - redis
    networks:
      - soundmap-net

  mobile_app_api:
    build:
      context: ./backend/api_app_mobile
      dockerfile: Dockerfile
    container_name: mobile_app_api
    environment:
      - JWT_SECRET=SSC0965
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=appData
      - DB_HOST=database
    ports:
      - "4343:4343"
    tty: true
    stdin_open: true
    depends_on:
      kafka:
        condition: service_started
      database:
        condition: service_started
      init-kafka:
        condition: service_completed_successfully
    networks:
      - soundmap-net

  web_app_api:
    build:
      context: ./backend/api_web_app
      dockerfile: Dockerfile
    container_name: web_app_api
    environment:
      - JWT_SECRET=SSC0965
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=database
      - REDIS_HOST=soundmap_redis
      - REDIS_PORT=6379
    ports:
      - "4344:4344"
    tty: true
    stdin_open: true
    depends_on:
      - database
      - kafka
    networks:
      - soundmap-net

  prometheus:
    image: prom/prometheus:v2.51.0
    depends_on:
      - spark
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - soundmap-net

  grafana:
    image: grafana/grafana:10.4.0
    depends_on:
      - prometheus
      - database
    ports:
      - "5284:3000" # imagem escuta na porta 3000 por padrão
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: soundmap
      DB_USER: admin_g4
      DB_PASSWORD: admin_g4
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - soundmap-net

  frontend:
    build: ./frontend/web_app
    ports:
      - "5184:5184"
    depends_on:
      - web_app_api
    networks:
      - soundmap-net

volumes:
  redis_data:
  grafana_data:
  prometheus_data:
  pg_volumn:
  kafka_data:

networks:
  soundmap-net:
    driver: bridge
